<!doctype html>
<html lang="en" data-theme="luxury">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3"></script>
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body class="flex min-w-screen min-h-screen">
    <div
      id="app"
      class="flex flex-col min-w-screen min-h-screen h-full w-full justify-center items-center"
    >
      <div>
        <section v-show="inProgressAssignments.length">
          <h2 class="font-bold text-2xl mb-2">In Progress</h2>
          <ul>
            <li
              v-for="assignment in inProgressAssignments"
              :key="assignment.id"
              class="py-1"
            >
              <label :for="toClassName(assignment.name)" class="mr-2">
                {{ assignment.name }}
              </label>
              <input
                :id="toClassName(assignment.name)"
                :name="toClassName(assignment.name)"
                type="checkbox"
                v-model="assignment.complete"
              />
            </li>
          </ul>
          <!-- <pre>{{ assignments }}</pre> -->
        </section>

        <section v-if="completedAssignments.length" class="mt-8">
          <h2 class="font-bold text-2xl mb-2">Completed</h2>
          <ul>
            <li
              v-for="assignment in completedAssignments"
              :key="assignment.id"
              class="py-1"
            >
              <label :for="toClassName(assignment.name)" class="mr-2">
                {{ assignment.name }}
              </label>
              <input
                :id="toClassName(assignment.name)"
                :name="toClassName(assignment.name)"
                type="checkbox"
                v-model="assignment.complete"
              />
            </li>
          </ul>
        </section>
      </div>
    </div>
    <script>
      let app = {
        data() {
          return {
            assignments: [
              { name: "Finish project", complete: false, id: 1 },
              { name: "Read chapter 4", complete: false, id: 2 },
              { name: "Turn in homework", complete: false, id: 3 },
            ],
          };
        },
        methods: {
          toClassName(text) {
            return text
              .toLowerCase() // всё в нижний регистр
              .normalize("NFD") // разбиваем буквы + диакритику
              .replace(/[\u0300-\u036f]/g, "") // убираем акценты
              .replace(/[^a-z0-9\s-]/g, "") // убираем спецсимволы
              .trim() // убираем пробелы по краям
              .replace(/\s+/g, "-"); // пробелы → дефисы
          },
        },
        computed: {
          inProgressAssignments() {
            return this.assignments.filter(
              (assignment) => !assignment.complete,
            );
          },
          completedAssignments() {
            return this.assignments.filter((assignment) => assignment.complete);
          },
        },
      };

      Vue.createApp(app).mount("#app");
    </script>
  </body>
</html>
